version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install boto3 -q

  pre_build:
    commands:
      - echo "Validating Lambda files..."
      - python -c "import ast; ast.parse(open('lambda/pricing_engine.py').read()); print('pricing_engine.py OK')"
      - python -c "import ast; ast.parse(open('lambda/pricing_api.py').read()); print('pricing_api.py OK')"

  build:
    commands:
      - echo "Packaging Lambda functions..."
      - zip -j pricing-engine.zip lambda/pricing_engine.py
      - zip -j pricing-api.zip lambda/pricing_api.py

  post_build:
    commands:
      - echo "Deploying to Lambda..."
      - aws lambda update-function-code --function-name hotel-pricing-engine --zip-file fileb://pricing-engine.zip
      - aws lambda update-function-code --function-name hotel-pricing-api --zip-file fileb://pricing-api.zip
      - echo "Triggering pricing run..."
      - aws lambda invoke --function-name hotel-pricing-engine /tmp/output.json
      - cat /tmp/output.json
      - echo "Deployment complete!"

artifacts:
  files:
    - pricing-engine.zip
    - pricing-api.zip
